<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ahmed Mahrous — Flutter Developer | أحمد محروس — مطوّر تطبيقات فلاتر">
  <meta name="theme-color" content="#0f172a">
  <title>Ahmed Mahrous | أحمد محروس</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1220;
      --surface: #121a2b;
      --surface-2: #1a2438;
      --text: #e8edf5;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --border: rgba(148, 163, 184, 0.15);
      --radius: 14px;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      --font-ar: "Cairo", system-ui, sans-serif;
      --font-en: "Outfit", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ar);
      line-height: 1.65;
      overflow-x: hidden;
    }
    html[lang="en"] body { font-family: var(--font-en); }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 60vw;
      max-width: 720px;
      height: 60vw;
      max-height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }
    html[dir="rtl"] .bg-glow { left: auto; right: -10%; transform: none; }
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }
    header.site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; align-items: center; gap: 0.5rem 1.25rem; flex-wrap: wrap; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface);
    }
    .lang-switch button {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }
    .lang-switch button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1220;
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      align-items: center;
      padding: 2rem 0 3.5rem;
    }
    @media (min-width: 880px) {
      .hero { grid-template-columns: 1.15fr 1fr; padding: 3rem 0 4rem; }
    }
    .hero-badge {
      display: inline-block;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.25);
      margin-bottom: 1rem;
    }
    .hero h1 {
      margin: 0 0 1rem;
      font-size: clamp(1.85rem, 4vw, 2.75rem);
      line-height: 1.2;
      letter-spacing: -0.03em;
    }
    .hero-lead {
      margin: 0 0 1.75rem;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 36ch;
    }
    .hero-cta { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.35rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1220;
      box-shadow: 0 8px 28px rgba(56, 189, 248, 0.25);
    }
    .btn-primary:hover { box-shadow: 0 12px 36px rgba(129, 140, 248, 0.3); }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 6px);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .hero-photo {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
      margin: 0 auto 1.25rem;
      border-radius: 20px;
      object-fit: cover;
      border: 2px solid rgba(56, 189, 248, 0.35);
      background: var(--surface-2);
      display: block;
    }
    .hero-card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .stat { text-align: center; }
    .stat strong { display: block; font-size: 1.15rem; color: var(--accent); }
    .stat span { font-size: 0.75rem; color: var(--muted); }
    section { padding: 3rem 0; scroll-margin-top: 5rem; }
    .section-title { margin: 0 0 0.5rem; font-size: 1.65rem; letter-spacing: -0.02em; }
    .section-desc { margin: 0 0 2rem; color: var(--muted); max-width: 50ch; }
    .projects { display: grid; gap: 1.25rem; }
    @media (min-width: 640px) { .projects { grid-template-columns: repeat(2, 1fr); } }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .project-card:hover {
      border-color: rgba(56, 189, 248, 0.35);
      transform: translateY(-2px);
    }
    .project-card h3 { margin: 0 0 0.5rem; font-size: 1.15rem; }
    .project-card p { margin: 0 0 1rem; color: var(--muted); font-size: 0.95rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.25rem 0.55rem;
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--muted);
    }
    .project-links { display: flex; flex-wrap: wrap; gap: 0.65rem; }
    .project-links a {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .project-links a:hover { text-decoration: underline; }
    .skills-wrap { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .skill-pill {
      padding: 0.55rem 1rem;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.12), rgba(129, 140, 248, 0.12));
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .cv-box {
      background: linear-gradient(145deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
    }
    @media (min-width: 560px) {
      .cv-box { flex-direction: row; align-items: center; justify-content: space-between; }
    }
    .cv-box p { margin: 0; color: var(--muted); max-width: 42ch; }
    .contact-grid { display: grid; gap: 1rem; }
    @media (min-width: 560px) { .contact-grid { grid-template-columns: repeat(2, 1fr); } }
    .contact-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }
    .contact-item strong {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .contact-item a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      word-break: break-all;
    }
    .contact-item a:hover { text-decoration: underline; }
    footer {
      padding: 2rem 0 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="wrap">
    <header class="site-header">
      <a class="logo" href="#top">Ahmed <span>Mahrous</span></a>
      <nav aria-label="Primary">
        <a href="#projects" data-i18n-nav="projects"></a>
        <a href="#skills" data-i18n-nav="skills"></a>
        <a href="#cv" data-i18n-nav="cv"></a>
        <a href="#contact" data-i18n-nav="contact"></a>
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" id="lang-ar" aria-pressed="true">العربية</button>
          <button type="button" id="lang-en" aria-pressed="false">English</button>
        </div>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div>
          <span class="hero-badge" data-i18n="badge"></span>
          <h1 id="hero-title" data-i18n="heroTitle"></h1>
          <p class="hero-lead" data-i18n="heroLead"></p>
          <div class="hero-cta">
            <a class="btn btn-primary" href="#projects" data-i18n="ctaWork"></a>
            <a class="btn btn-ghost" href="#contact" data-i18n="ctaHire"></a>
          </div>
        </div>
        <div class="hero-card">
          <img class="hero-photo" src="assets/photo.jpg" alt="" width="280" height="280" data-i18n-alt="photoAlt">
          <p style="margin:0;color:var(--muted);font-size:0.92rem;" data-i18n="photoCaption"></p>
          <div class="hero-card-stats" aria-hidden="true">
            <div class="stat"><strong>Flutter</strong><span>Dart</span></div>
            <div class="stat"><strong>Mobile</strong><span>UI/UX</span></div>
            <div class="stat"><strong>API</strong><span>Backend</span></div>
          </div>
        </div>
      </section>

      <section id="projects" aria-labelledby="projects-title">
        <h2 class="section-title" id="projects-title" data-i18n="secProjects"></h2>
        <p class="section-desc" data-i18n="secProjectsDesc"></p>
        <div class="projects">
          <article class="project-card">
            <h3>Qimni</h3>
            <p data-i18n="projQimni"></p>
            <div class="project-tags"><span class="tag">Flutter</span><span class="tag">Firebase</span></div>
            <div class="project-links">
              <a href="https://github.com/ahmedmahrous0023" target="_blank" rel="noopener noreferrer" data-i18n="linkGithub"></a>
            </div>
          </article>
          <article class="project-card">
            <h3>Meknaz</h3>
            <p data-i18n="projMeknaz"></p>
            <div class="project-tags"><span class="tag">Flutter</span><span class="tag">Supabase</span></div>
            <div class="project-links">
              <a href="https://github.com/ahmedmahrous0023" target="_blank" rel="noopener noreferrer" data-i18n="linkGithub"></a>
            </div>
          </article>
        </div>
      </section>

      <section id="skills" aria-labelledby="skills-title">
        <h2 class="section-title" id="skills-title" data-i18n="secSkills"></h2>
        <p class="section-desc" data-i18n="secSkillsDesc"></p>
        <div class="skills-wrap">
          <span class="skill-pill">Flutter</span>
          <span class="skill-pill">Dart</span>
          <span class="skill-pill">Firebase</span>
          <span class="skill-pill">Supabase</span>
          <span class="skill-pill">REST APIs</span>
        </div>
      </section>

      <section id="cv" aria-labelledby="cv-title">
        <h2 class="section-title" id="cv-title" data-i18n="secCv"></h2>
        <p class="section-desc" data-i18n="secCvDesc"></p>
        <div class="cv-box">
          <p data-i18n="cvText"></p>
          <div style="display:flex;flex-wrap:wrap;gap:0.65rem;">
            <a class="btn btn-primary" href="assets/cv.pdf" target="_blank" rel="noopener noreferrer" data-i18n="cvView"></a>
            <a class="btn btn-ghost" href="assets/cv.pdf" download data-i18n="cvDownload"></a>
          </div>
        </div>
      </section>

      <section id="contact" aria-labelledby="contact-title">
        <h2 class="section-title" id="contact-title" data-i18n="secContact"></h2>
        <p class="section-desc" data-i18n="secContactDesc"></p>
        <div class="contact-grid">
          <div class="contact-item">
            <strong data-i18n="labelEmail"></strong>
            <a href="mailto:your@email.com">your@email.com</a>
          </div>
          <div class="contact-item">
            <strong data-i18n="labelWhatsapp"></strong>
            <a href="https://wa.me/201000000000" target="_blank" rel="noopener noreferrer">+20 100 000 0000</a>
          </div>
          <div class="contact-item">
            <strong data-i18n="labelGithub"></strong>
            <a href="https://github.com/ahmedmahrous0023" target="_blank" rel="noopener noreferrer">github.com/ahmedmahrous0023</a>
          </div>
          <div class="contact-item">
            <strong data-i18n="labelLinkedin"></strong>
            <a href="https://linkedin.com/in/" target="_blank" rel="noopener noreferrer">linkedin.com/in/your-profile</a>
          </div>
        </div>
      </section>
    </main>

    <footer><p data-i18n="footer"></p></footer>
  </div>

  <script>
    (function () {
      const STRINGS = {
        ar: {
          nav: { projects: "المشاريع", skills: "المهارات", cv: "السيرة الذاتية", contact: "تواصل" },
          badge: "مطوّر تطبيقات موبايل",
          heroTitle: "أبني تطبيقات حديثة بفلاتر — سريعة، واضحة، وجاهزة للنشر",
          heroLead: "أعمل مع الأفراد والفرق على منتجات حقيقية: من الفكرة إلى المتجر. اهتم بالأداء، تجربة المستخدم، والتكامل مع الخلفيات والخدمات السحابية.",
          ctaWork: "شاهد أعمالي",
          ctaHire: "توظيف / تعاون",
          photoAlt: "صورة أحمد محروس",
          photoCaption: "أحمد محروس — مطوّر Flutter",
          secProjects: "مشاريع مختارة",
          secProjectsDesc: "أمثلة على تطبيقات نُشرت أو قيد التطوير. يمكن إضافة صور شاشة وروابط المتاجر لاحقاً.",
          projQimni: "تطبيق يجمع بين صفحة روابط، متجر بسيط، وتحليلات لزيارات الروابط.",
          projMeknaz: "تتبع مالي وأهداف مالية مع واجهة واضحة لتنظيم الإنفاق والادخار.",
          linkGithub: "المستودع على GitHub ←",
          secSkills: "المهارات والتقنيات",
          secSkillsDesc: "أستخدم أدوات حديثة لبناء تطبيقات قابلة للصيانة والتوسع.",
          secCv: "السيرة الذاتية",
          secCvDesc: "اطّلع على الخلفية والخبرة بتنسيق PDF.",
          cvText: "افتح أو حمّل السيرة من assets/cv.pdf بعد رفعها للمستودع.",
          cvView: "عرض PDF",
          cvDownload: "تحميل PDF",
          secContact: "تواصل معي",
          secContactDesc: "للاستفسارات التجارية، العروض، أو المشاريع الطويلة المدى.",
          labelEmail: "البريد",
          labelWhatsapp: "واتساب",
          labelGithub: "GitHub",
          labelLinkedin: "LinkedIn",
          footer: "© أحمد محروس. جميع الحقوق محفوظة."
        },
        en: {
          nav: { projects: "Projects", skills: "Skills", cv: "Résumé", contact: "Contact" },
          badge: "Mobile app developer",
          heroTitle: "I build modern Flutter apps — polished, fast, and ready to ship",
          heroLead: "I work with individuals and teams on real products: from idea to store listing. I care about performance, UX, and integration with backends and cloud services.",
          ctaWork: "View my work",
          ctaHire: "Hire / collaborate",
          photoAlt: "Ahmed Mahrous photo",
          photoCaption: "Ahmed Mahrous — Flutter Developer",
          secProjects: "Selected projects",
          secProjectsDesc: "Shipped or in-progress apps. Add screenshots and store links when available.",
          projQimni: "Link-in-bio style app with a simple shop and link analytics.",
          projMeknaz: "Money tracking and savings goals with a clear, focused UI.",
          linkGithub: "GitHub repository →",
          secSkills: "Skills & stack",
          secSkillsDesc: "Modern tooling for maintainable, scalable mobile apps.",
          secCv: "Résumé",
          secCvDesc: "Experience and background in PDF format.",
          cvText: "Open or download the PDF from assets/cv.pdf after uploading it to the repo.",
          cvView: "Open PDF",
          cvDownload: "Download PDF",
          secContact: "Get in touch",
          secContactDesc: "For commercial inquiries, proposals, or long-term projects.",
          labelEmail: "Email",
          labelWhatsapp: "WhatsApp",
          labelGithub: "GitHub",
          labelLinkedin: "LinkedIn",
          footer: "© Ahmed Mahrous. All rights reserved."
        }
      };

      function applyLang(lang) {
        const isAr = lang === "ar";
        document.documentElement.lang = lang;
        document.documentElement.dir = isAr ? "rtl" : "ltr";
        document.querySelector("#lang-ar").setAttribute("aria-pressed", isAr);
        document.querySelector("#lang-en").setAttribute("aria-pressed", !isAr);
        const t = STRINGS[lang];
        document.querySelectorAll("[data-i18n-nav]").forEach(function (el) {
          el.textContent = t.nav[el.getAttribute("data-i18n-nav")] || "";
        });
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          const key = el.getAttribute("data-i18n");
          if (key && t[key] !== undefined) el.textContent = t[key];
        });
        document.querySelectorAll("[data-i18n-alt]").forEach(function (el) {
          const key = el.getAttribute("data-i18n-alt");
          if (key && t[key] !== undefined) el.setAttribute("alt", t[key]);
        });
        try { localStorage.setItem("portfolio-lang", lang); } catch (e) {}
      }

      document.getElementById("lang-ar").addEventListener("click", function () { applyLang("ar"); });
      document.getElementById("lang-en").addEventListener("click", function () { applyLang("en"); });

      var saved = null;
      try { saved = localStorage.getItem("portfolio-lang"); } catch (e) {}
      applyLang(saved === "en" || saved === "ar" ? saved : "ar");
    })();
  </script>
</body>
</html>
